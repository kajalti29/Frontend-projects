<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
       *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
       }

       body{
        background-color: ghostwhite;
        font-family: Arial, Helvetica, sans-serif;
       }

       .navbar{
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: rgb(48, 91, 192);
        color: white;
       }

       .logo{
        font-size: 30px;
        font-weight: bold;
        margin: 20px;
       }

       .nav-links{
        display: flex;
        list-style: none;
        gap: 20px;
       }

       .nav-links li{
        padding: 10px;
       }

       .nav-links a{
           text-decoration: none;
           color: white;
           font-size: 18px;
       }

       .nav-links a:hover{
        color: greenyellow;
       }

       .hamburger{
        display: none;
        font-size: 20px;
        cursor: pointer;
       }
        
       @media(min-width:768px){
        .nav-links{
            display: none;
            flex-direction: column;
            gap:15px;
            background-color: chartreuse;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            position: absolute;
            top:60px; 
            right:20px;
        }

        .nav-links:active{
            display: flex;
        }

        .hamburger{
            display: block;
        }
       }
    </style>

</head>
<body>
    <nav class="navbar">
        <div class="logo">Kajalti</div>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Skills</a></li>
            <li><a href="#">Projects</a></li>
            <li><a href="#">Contact</li>
        </ul>
    </nav>

    <div class="hamburger">&#9776;</div>


    <script>
        const hamburger = document.querySelector('.hamburger');
const navLinks = document.querySelector('.nav-links');

hamburger.addEventListener('click', () => {
    navLinks.classList.toggle('active');
}); 
    </script>
</body>
</html>
